<svg xmlns="http://www.w3.org/2000/svg" width="120" height="140" viewBox="0 0 120 140">
  <defs>
    <linearGradient id="ga" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff87"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Diamond -->
  <polygon points="60,4 105,60 60,116 15,60" fill="none" stroke="url(#ga)" stroke-width="2.5"/>
  <polygon points="60,24 88,60 60,96 32,60" fill="url(#ga)" fill-opacity="0.1"/>
  <polygon points="60,24 88,60 60,96 32,60" fill="none" stroke="url(#ga)" stroke-width="1.2"/>

  <!-- Connector lines -->
  <line x1="60" y1="4" x2="60" y2="24" stroke="#00ff87" stroke-width="2"/>
  <line x1="105" y1="60" x2="88" y2="60" stroke="#00ff87" stroke-width="2"/>
  <line x1="60" y1="116" x2="60" y2="96" stroke="#0ea5e9" stroke-width="2"/>
  <line x1="15" y1="60" x2="32" y2="60" stroke="#0ea5e9" stroke-width="2"/>

  <!-- Corner dots -->
  <circle cx="60" cy="4" r="4.5" fill="#00ff87"/>
  <circle cx="105" cy="60" r="4.5" fill="#00ff87"/>
  <circle cx="60" cy="116" r="4.5" fill="#0ea5e9"/>
  <circle cx="15" cy="60" r="4.5" fill="#0ea5e9"/>

  <!-- Inner diagonal lines -->
  <line x1="32" y1="60" x2="60" y2="24" stroke="url(#ga)" stroke-width="0.8" opacity="0.35"/>
  <line x1="88" y1="60" x2="60" y2="24" stroke="url(#ga)" stroke-width="0.8" opacity="0.35"/>
  <line x1="32" y1="60" x2="60" y2="96" stroke="url(#ga)" stroke-width="0.8" opacity="0.35"/>
  <line x1="88" y1="60" x2="60" y2="96" stroke="url(#ga)" stroke-width="0.8" opacity="0.35"/>

  <!-- Text -->
  <text x="60" y="130" text-anchor="middle" font-size="13" font-weight="bold" font-family="Arial" fill="white" letter-spacing="2">MSB HELP</text>
</svg>